blank_issues_enabled: false

issue_templates:
  - name: "Bug Report"
    description: "Report a functional or hardware issue on your Galaxy Tab A9+"
    title: "[BUG]: "
    labels:
      - bug
    body: "bug_report.md"

  - name: "Feature Request"
    description: "Suggest a new feature or enhancement for your device"
    title: "[FEAT]: "
    labels:
      - enhancement
    body: "feature_request.md"